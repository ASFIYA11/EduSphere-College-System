<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSphere Core | Enterprise Portal</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); padding: 40px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); width: 350px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
        h2 { text-align: center; margin-bottom: 24px; color: #38bdf8; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #94a3b8; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #0284c7; color: white; font-weight: bold; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #0369a1; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>EduSphere Login</h2>
    <form id="loginForm">
        <div class="form-group">
            <label>Select Matrix System Role</label>
            <select id="role" required>
                <option value="student">Student Portal Access</option>
                <option value="faculty">Faculty Management Node</option>
                <option value="admin">System Administration Core</option>
            </select>
        </div>
        <div class="form-group">
            <label>Identity Username / ID</label>
            <input type="text" id="username" placeholder="Enter alphanumeric identifier..." required>
        </div>
        <div class="form-group">
            <label>Security Keyphrase (Password)</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit">Initialize Authentication</button>
    </form>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const role = document.getElementById('role').value;
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    try {
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ role, username, password })
        });

        const data = await response.json();
        
        if (response.ok) {
            Swal.fire('Authenticated!', `Access granted to cluster dashboard.`, 'success').then(() => {
                // If admin, show admin metrics alert box, else load dashboard panels
                Swal.fire('System Verified', `Active Session Profile established as: ${data.role.toUpperCase()}`, 'info');
            });
        } else {
            Swal.fire('Authentication Failure', data.message, 'error');
        }
    } catch (err) {
        Swal.fire('Network Intercept Error', 'Could not establish connection link to Flask server endpoints.', 'error');
    }
});
</script>
</body>
</html>
